<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Nós ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: black;
      color: white;
      text-align: center;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: linear-gradient(to top, black, transparent),
                  url('https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2');
      background-size: cover;
    }

    h1 {
      font-size: 3em;
      animation: fadeIn 3s;
    }

    p {
      font-size: 1.5em;
      animation: fadeIn 5s;
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    .gallery img {
      width: 200px;
      margin: 10px;
      border-radius: 15px;
    }

    button {
      padding: 15px;
      font-size: 1em;
      border: none;
      border-radius: 10px;
      background: pink;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="hero">
  <h1>O nosso amor ❤️</h1>
  <p id="contador"></p>
</div>

<h2>Memórias 📸</h2>
<div class="gallery" id="gallery"></div>

<button onclick="upload()">Adicionar memória</button>

<input type="file" id="fileInput" hidden>

<script>
const cloudName = "dmdszvcmf";
const uploadPreset = "unsigned_preset";

const gallery = document.getElementById("gallery");

// carregar imagens guardadas
window.onload = function () {
  const fotos = JSON.parse(localStorage.getItem("fotos")) || [];

  fotos.forEach(url => {
    const img = document.createElement("img");
    img.src = url;
    gallery.appendChild(img);
  });
};

function upload() {
  const input = document.createElement("input");
  input.type = "file";

  input.onchange = async function () {
    const file = input.files[0];

    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", uploadPreset);

    const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    // adicionar imagem
    const img = document.createElement("img");
    img.src = data.secure_url;
    gallery.appendChild(img);

    // guardar no localStorage
    const fotos = JSON.parse(localStorage.getItem("fotos")) || [];
    fotos.push(data.secure_url);
    localStorage.setItem("fotos", JSON.stringify(fotos));
  };

  input.click();
}
</script>
</body>
</html>
