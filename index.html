<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Nós ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: black;
      color: white;
      text-align: center;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: linear-gradient(to top, black, transparent),
                  url('https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2');
      background-size: cover;
    }

    h1 {
      font-size: 3em;
      animation: fadeIn 3s;
    }

    p {
      font-size: 1.5em;
      animation: fadeIn 5s;
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    .gallery img {
      width: 200px;
      margin: 10px;
      border-radius: 15px;
    }

    button {
      padding: 15px;
      font-size: 1em;
      border: none;
      border-radius: 10px;
      background: pink;
      cursor: pointer;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    
    .modal img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 15px;
    }

    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 40px;
      color: white;
      cursor: pointer;
      padding: 10px;
      user-select: none;
    }
    
    #prevBtn {
      left: 10px;
    }
    
    #nextBtn {
      right: 10px;
    }
    
    #deleteBtn {
      margin-top: 10px;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: red;
      color: white;
      cursor: pointer;
    }
    
  </style>
</head>

<body>

<div class="hero">
  <h1>O nosso amor ❤️</h1>
  <p id="contador"></p>
</div>

<h2>Memórias 📸</h2>
<div class="gallery" id="gallery"></div>

<button onclick="upload()">Adicionar memória</button>

<input type="file" id="fileInput" hidden>

<script>
window.onload = function () {

  const cloudName = "dmdszvcmf";
  const uploadPreset = "unsigned_preset";

  const BIN_ID = "69d39e51856a6821890401bd";
  const API_KEY = "$2a$10$Ixhs4dMS2Q8SMB6Yrc9tFufSiswuDzSPk/wNG7SAf5zYiZdNMr3Bm";

  const gallery = document.getElementById("gallery");
  const fileInput = document.getElementById("fileInput");
  const modal = document.getElementById("modal");
  const dataInicio = new Date("2024-04-07");

  function atualizarContador() {
    try {
      const contador = document.getElementById("contador");
      if (!contador) return;
  
      const agora = new Date();
  
      let anos = agora.getFullYear() - dataInicio.getFullYear();
      let meses = agora.getMonth() - dataInicio.getMonth();
      let dias = agora.getDate() - dataInicio.getDate();
  
      if (dias < 0) {
        meses--;
        dias += new Date(agora.getFullYear(), agora.getMonth(), 0).getDate();
      }
  
      if (meses < 0) {
        anos--;
        meses += 12;
      }
  
      const texto = `Estamos juntos há ${anos} anos, ${meses} meses e ${dias} dias ❤️`;
  
      contador.innerText = texto;
  
    } catch (e) {
      console.log("erro contador", e);
    }
  }
  
  const modalImg = document.getElementById("modalImg");
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  const modalText = document.getElementById("modalText");
  const deleteBtn = document.getElementById("deleteBtn");

  prevBtn.onclick = () => { 
    indexAtual = (indexAtual - 1 + imagens.length) % imagens.length;
    abrirModal();
  };

  nextBtn.onclick = () => {
    indexAtual = (indexAtual + 1) % imagens.length;
    abrirModal();
  };

  deleteBtn.onclick = async () => {
  if (!confirm("Tens a certeza que queres apagar esta memória? 😢")) return;

  // remover da lista
  imagens.splice(indexAtual, 1);

  // guardar nova lista no JSONBin
  await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "X-Master-Key": API_KEY
    },
    body: JSON.stringify({ fotos: imagens })
  });

  // fechar modal
  modal.style.display = "none";

  // recarregar galeria
  loadImages();
};
  
  let imagens = [];
  let indexAtual = 0;
  
  // fechar ao clicar fora
  modal.onclick = (e) => {
  if (e.target === modal) {
    modal.style.display = "none";
  }
};
  
  // 🔄 carregar imagens
  async function loadImages() {
    try {
      gallery.innerHTML = "";

      const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
        headers: { "X-Master-Key": API_KEY }
      });

      const data = await res.json();
      const fotos = data.record.fotos || [];

      imagens = fotos;

      fotos.forEach(foto => {
        if (typeof foto === "string") {
          addImage(foto, "");
        } else {
          addImage(foto.url, foto.texto);
        }
      });

    } catch (e) {
      console.log("erro ao carregar", e);
    }
  }

  // 💾 guardar imagem
  async function saveImage(url, texto) {
  try {
    let fotos = imagens || [];

    // converter para formato correto
    fotos = fotos.map(f => {
      if (typeof f === "string") {
        return { url: f, texto: "" };
      }
      return f;
    });

    fotos.push({ url, texto });

    // atualizar variável global também
    imagens = fotos;

    await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "X-Master-Key": API_KEY,
        "X-Bin-Versioning": "false"
      },
      body: JSON.stringify({ fotos })
    });

  } catch (e) {
    console.log("erro ao guardar", e);
  }
}

  // 📸 upload via input real (TELEMÓVEL OK)
  fileInput.onchange = async function () {
    try {
      const file = fileInput.files[0];

      const formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", uploadPreset);

      const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
        method: "POST",
        body: formData
      });

      const data = await res.json();

      const texto = prompt("Escreve uma legenda ❤️");

      addImage(data.secure_url, texto);
      saveImage(data.secure_url, texto);
      loadImages();

    } catch (e) {
      console.log("erro upload", e);
    }
  };

  // botão
  window.upload = function () {
    fileInput.click();
  };

  // adicionar imagem
  function addImage(url, texto) {
  const index = gallery.children.length;

  const img = document.createElement("img");

  img.src = url.replace("/upload/", "/upload/w_400,q_auto/");

  img.onclick = () => {
    indexAtual = index;
    abrirModal();
  };

  gallery.appendChild(img);
}


  // iniciar
  loadImages();
  
  atualizarContador();
  setInterval(atualizarContador, 60000);

  function abrirModal() {
  const foto = imagens[indexAtual];

  const url = typeof foto === "string" ? foto : foto.url;
  const texto = typeof foto === "string" ? "" : foto.texto;

  modal.style.display = "flex";
  modalImg.src = url;
  modalText.innerText = texto;
}

  let startX = 0;

  modal.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
  });
  
  modal.addEventListener("touchend", e => {
    let endX = e.changedTouches[0].clientX;
  
    if (endX < startX - 50) {
      indexAtual = (indexAtual + 1) % imagens.length;
      abrirModal();
    }
  
    if (endX > startX + 50) {
      indexAtual = (indexAtual - 1 + imagens.length) % imagens.length;
      abrirModal();
    }
  });
};
</script>
  
<div id="modal" class="modal">
  <span id="prevBtn" class="arrow">❮</span>

  <div style="text-align:center">
    <img id="modalImg">
    <p id="modalText"></p>
    <button id="deleteBtn">🗑️ Apagar</button>
  </div>

  <span id="nextBtn" class="arrow">❯</span>
</div>

</body>
</html>
