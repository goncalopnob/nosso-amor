<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Nós ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: black;
      color: white;
      text-align: center;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: linear-gradient(to top, black, transparent),
                  url('https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2');
      background-size: cover;
    }

    h1 {
      font-size: 3em;
      animation: fadeIn 3s;
    }

    p {
      font-size: 1.5em;
      animation: fadeIn 5s;
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    .gallery img {
      width: 200px;
      margin: 10px;
      border-radius: 15px;
    }

    button {
      padding: 15px;
      font-size: 1em;
      border: none;
      border-radius: 10px;
      background: pink;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="hero">
  <h1>O nosso amor ❤️</h1>
  <p id="contador"></p>
</div>

<h2>Memórias 📸</h2>
<div class="gallery" id="gallery"></div>

<button onclick="upload()">Adicionar memória</button>

<input type="file" id="fileInput" hidden>

<script type="module">
  // IMPORTS FIREBASE
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getStorage, ref, uploadBytes, getDownloadURL, listAll } 
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  // CONFIG (O TEU)
  const firebaseConfig = {
    apiKey: "AIzaSyCgSnfOY0HdWrhhpr1vNZBeV9YiVu-OSY",
    authDomain: "nosso-amor-4a907.firebaseapp.com",
    projectId: "nosso-amor-4a907",
    storageBucket: "nosso-amor-4a907.appspot.com",
    messagingSenderId: "891196431251",
    appId: "1:891196431251:web:ffd57c880567bc5743e666"
  };

  // INIT
  const app = initializeApp(firebaseConfig);
  const storage = getStorage(app);

  const fileInput = document.getElementById("fileInput");
  const gallery = document.getElementById("gallery");

  // UPLOAD
  fileInput.addEventListener("change", async (e) => {
    const file = e.target.files[0];
    const storageRef = ref(storage, "fotos/" + file.name);

    await uploadBytes(storageRef, file);
    const url = await getDownloadURL(storageRef);

    addImage(url);
  });

  function addImage(url) {
    const img = document.createElement("img");
    img.src = url;
    gallery.appendChild(img);
  }

  // CARREGAR IMAGENS EXISTENTES
  async function loadImages() {
    const listRef = ref(storage, "fotos/");
    const res = await listAll(listRef);

    res.items.forEach(async (itemRef) => {
      const url = await getDownloadURL(itemRef);
      addImage(url);
    });
  }

  loadImages();

  // BOTÃO
  window.upload = function () {
    fileInput.click();
  };
</script>
</body>
</html>
