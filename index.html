<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Nós ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: black;
      color: white;
      text-align: center;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: linear-gradient(to top, black, transparent),
                  url('https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2');
      background-size: cover;
    }

    h1 {
      font-size: 3em;
      animation: fadeIn 3s;
    }

    p {
      font-size: 1.5em;
      animation: fadeIn 5s;
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    .gallery img {
      width: 200px;
      margin: 10px;
      border-radius: 15px;
    }

    button {
      padding: 15px;
      font-size: 1em;
      border: none;
      border-radius: 10px;
      background: pink;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="hero">
  <h1>O nosso amor ❤️</h1>
  <p id="contador"></p>
</div>

<h2>Memórias 📸</h2>
<div class="gallery" id="gallery"></div>

<button onclick="upload()">Adicionar memória</button>

<input type="file" id="fileInput" hidden>

<script>
window.onload = function () {

  const cloudName = "dmdszvcmf";
  const uploadPreset = "unsigned_preset";

  const BIN_ID = "69d39e51856a6821890401bd";
  const API_KEY = "$2a$10$Ixhs4dMS2Q8SMB6Yrc9tFufSiswuDzSPk/wNG7SAf5zYiZdNMr3Bm";

  const gallery = document.getElementById("gallery");
  const fileInput = document.getElementById("fileInput");

  // 🔄 carregar imagens
  async function loadImages() {
    try {
      gallery.innerHTML = "";

      const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
        headers: { "X-Master-Key": API_KEY }
      });

      const data = await res.json();
      const fotos = data.record.fotos || [];

      fotos.forEach(url => addImage(url));

    } catch (e) {
      console.log("erro ao carregar", e);
    }
  }

  // 💾 guardar imagem
  async function saveImage(url) {
    try {
      const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
        headers: { "X-Master-Key": API_KEY }
      });

      const data = await res.json();
      const fotos = data.record.fotos || [];

      fotos.push(url);

      await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "X-Master-Key": API_KEY,
          "X-Bin-Versioning": "false"
        },
        body: JSON.stringify({ fotos })
      });

    } catch (e) {
      console.log("erro ao guardar", e);
    }
  }

  // 📸 upload via input real (TELEMÓVEL OK)
  fileInput.onchange = async function () {
    try {
      const file = fileInput.files[0];

      const formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", uploadPreset);

      const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
        method: "POST",
        body: formData
      });

      const data = await res.json();

      addImage(data.secure_url);
      saveImage(data.secure_url);

    } catch (e) {
      console.log("erro upload", e);
    }
  };

  // botão
  window.upload = function () {
    fileInput.click();
  };

  // adicionar imagem
  function addImage(url) {
    const img = document.createElement("img");
    img.src = url;
    gallery.appendChild(img);
  }

  // iniciar
  loadImages();
};
</script>

</body>
</html>
